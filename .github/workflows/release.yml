name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

jobs:
  release:
    name: Tag and publish
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      new_tag: ${{ steps.get_version.outputs.new_tag }}
      new_version: ${{ steps.get_version.outputs.new_version }}
      bump_type: ${{ steps.get_version.outputs.bump_type }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Determine next semver from conventional commits since last tag (dry run)
      - uses: mathieudutour/github-tag-action@v6.2
        id: get_version
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true

      # Bump package.json and README CDN link, commit, then create the tag
      - name: Bump version references
        if: steps.get_version.outputs.bump_type != ''
        run: |
          npm version ${{ steps.get_version.outputs.new_version }} --no-git-tag-version
          sed -i "s|aframe-room-component@v[0-9]*\.[0-9]*\.[0-9]*|aframe-room-component@v${{ steps.get_version.outputs.new_version }}|g" README.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json README.md
          git commit -m "chore: bump version to ${{ steps.get_version.outputs.new_tag }} [skip ci]"
          git push

      - uses: mathieudutour/github-tag-action@v6.2
        if: steps.get_version.outputs.bump_type != ''
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ steps.get_version.outputs.new_version }}

      - run: pnpm dist
        if: steps.get_version.outputs.bump_type != ''

      - run: pnpm publish --no-git-checks --access public
        if: steps.get_version.outputs.bump_type != ''
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: gh release create ${{ steps.get_version.outputs.new_tag }} --generate-notes dist/*
        if: steps.get_version.outputs.bump_type != ''
        env:
          GH_TOKEN: ${{ github.token }}

  deploy-pages:
    name: Deploy demo
    needs: release
    if: needs.release.outputs.bump_type != ''
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.new_tag }}

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm dist

      - name: Prepare demo site
        run: |
          cp -r example/ _site/
          install -D dist/aframe-room-component.min.js _site/src/index.js
          sed -i 's| type="module"||' _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - uses: actions/deploy-pages@v4
        id: deployment
